# ============================================================
# Orca 依赖栈一键拉起
# 用法: docker compose -f deploy/docker/docker-compose.yml up -d
# 含: MySQL8 / Redis7 / Kafka(KRaft 模式, 无 ZK) / Elasticsearch8 / PgVector
# KRaft 模式省去 ZooKeeper, Kafka 3.3+ 内置共识, 面试点可讲。
# ============================================================
name: orca

services:
  mysql:
    image: mysql:8.0
    container_name: orca-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: orca
      MYSQL_USER: orca
      MYSQL_PASSWORD: orca123
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: orca-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.1
    container_name: orca-kafka
    restart: unless-stopped
    # KRaft 模式: 单节点同时充当 controller+broker(无 ZooKeeper)
    # apache 官方镜像用 KAFKA_ 前缀(非 bitnami 的 KAFKA_CFG_)
    # controller quorum 用 localhost:9093(容器内自连); advertised 用 localhost 供宿主机客户端连
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # apache/kafka 3.7 默认启用 KIP-848 新组协调器, 与经典协议客户端(spring-kafka 3.6)冲突致 FIND_COORDINATOR 超时; 关闭用经典协议
      KAFKA_GROUP_COORDINATOR_REBALANCE_PROTOCOLS: classic
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # apache/kafka 要求 CLUSTER_ID 为 UUID 格式(双长度 hex)
      CLUSTER_ID: 4L6g3nShT-e2N0aAaYjJqQ
    ports:
      - "9092:9092"
    volumes:
      - ./data/kafka:/tmp/kraft-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: orca-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./data/es:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # PgVector: P2 阶段语义缓存向量库, 轻量起步
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: orca-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: orca
      POSTGRES_PASSWORD: orca123
      POSTGRES_DB: orca_vec
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgvector:/var/lib/postgresql/data
      - ./init/pgvector:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orca"]
      interval: 10s
      timeout: 5s
      retries: 10
