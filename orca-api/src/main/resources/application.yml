server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: orca-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 虚拟线程: Java21 亮点, 提升高并发吞吐(面试点)
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  # ---- P1: 接入 Redis(限流/配额热路径) ----
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  # ---- P1: 接入 MySQL(鉴权/记账/配额源记录) ----
  datasource:
    url: jdbc:mysql://localhost:3306/orca?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: orca
    password: orca123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
  # ---- P2: 接入 Kafka(异步记账) ----
  kafka:
    bootstrap-servers: localhost:9092

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# actuator 暴露 health/prometheus, 供 K8s 探针与 Prometheus 抓取
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true   # P1 已接 Redis
  tracing:
    sampling:
      probability: 1.0

# Resilience4j 熔断(程序式注册, 此 config 作为默认; Resilience4jConfig 启动时为每个 Provider 建熔断器)
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 3s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.orca.common.exception.BizException   # 业务异常不计入熔断, 只记上游故障

logging:
  level:
    root: INFO
    com.orca: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

# ---- 业务配置 ----
orca:
  # P2: PgVector 语义缓存第二数据源(独立配置, 不走 spring.datasource 避免自动配置冲突)
  pgvector:
    url: jdbc:postgresql://localhost:5432/orca_vec
    username: orca
    password: orca123
    pool-size: 8
  gateway:
    # 限流: 令牌桶(租户维度), 此为默认值, 实际取 tenant 表配置
    default-rpm: 60
    default-tpm: 100000
    default-daily-quota: 1000000
    mock:
      response-chunk-count: 20
      chunk-delay-ms: 80
    # P2 语义缓存
    cache:
      enabled: true
      dimension: 384
      similarity-threshold: 0.92
      ttl-hours: 24
    # P2 计费单价
    pricing:
      per-k-tokens: 0.002
  workflow:
    # 调度器扫描间隔
    scan-interval-ms: 3000
    human-task:
      scan-interval-ms: 10000
      default-timeout-minutes: 60
    lock:
      wait-ms: 500
    backoff-ms: 5000
    saga:
      max-retry: 3
    http:
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
    scheduler-batch-size: 100
  agent:
    max-steps: 15
    max-tokens: 50000
